aid: governance
name: API Governance
description: >-
  API Governance is the practice of defining and enforcing the policies,
  standards, and processes that guide how APIs are designed, built, secured,
  versioned, and retired across an organization. This topic indexes the
  providers, tools, and open-source linters that operationalize spec
  governance, design governance, security governance, and lifecycle
  governance for the API estate.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Governance
- Policies
- Rules
- Spectral
- Linting
- Lifecycle
- Compliance
- Standards
- OpenAPI
- AsyncAPI
url: >-
  https://raw.githubusercontent.com/api-evangelist/governance/refs/heads/main/apis.yml
created: '2026-05-22'
modified: '2026-05-22'
